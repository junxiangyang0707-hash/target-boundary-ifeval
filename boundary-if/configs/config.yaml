defaults:
  - paths: default
  - data: if_multi_constraints_upto5
  - split: group_key
  - target: llama32_3b
  - decoding: temp0
  - model: pretrained_if_encoder
  - train: boundary
  - eval: default
  - wandb: default
  - runtime: docker
  - _self_

task_name: boundary_if
seed: 42

hydra:
  job:
    chdir: false
  run:
    dir: ${paths.outputs_dir}/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${paths.outputs_dir}/hydra_multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
