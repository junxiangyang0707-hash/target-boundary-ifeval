name: pretrained_if_encoder
type: torch_tiny_transformer_encoder
tokenizer:
  type: byte_level_bpe
  vocab_size: 8000
max_len: 1024
truncation:
  strategy: head_tail
  head_tokens: 384
  tail_tokens: 384
layers: 4
hidden_size: 128
heads: 4
dropout: 0.1
pooling: cls_mean_concat
pretraining:
  objective_instruction_multilabel_weight: 1.0
  objective_num_constraints_weight: 0.2
checkpoint_dir: ${paths.pretrained_dir}/if_encoder_v1
